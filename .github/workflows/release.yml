name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build static binary
        run: go build -trimpath -ldflags="-s -w -buildid=" -o llm-proxy-${GOOS}-${GOARCH}
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}

      - name: Archive
        run: tar czf llm-proxy-${GOOS}-${GOARCH}.tar.gz llm-proxy-${GOOS}-${GOARCH}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: llm-proxy-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
